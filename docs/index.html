<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Showcase</title>
  <script type="module" crossorigin src="./assets/index-DzAknku_.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Dha4dLpj.css">
</head>
<body class="bg-slate-950 text-white overflow-hidden">
  <div id="canvas-container"></div>

  <!-- UI Layer -->
  <div id="ui-container" class="fixed inset-0 pointer-events-none">
    <!-- Scene Switcher -->
    <div id="scene-switcher" class="absolute top-6 left-6 pointer-events-auto flex flex-wrap gap-2 max-w-2xl">
      <button id="btn-landing" class="scene-btn active px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg transition-colors">
        Landing
      </button>
      <button id="btn-terrain" class="scene-btn px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors">
        Terrain
      </button>
      <button id="btn-water" class="scene-btn px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors">
        Water
      </button>
      <button id="btn-visualizer" class="scene-btn px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors">
        Visualizer
      </button>
    </div>

    <!-- Info Card -->
    <div id="info-card" class="absolute bottom-6 left-6 pointer-events-auto bg-slate-900 bg-opacity-80 backdrop-blur p-4 rounded-lg max-w-sm border border-slate-700">
      <h2 id="scene-title" class="text-xl font-bold mb-2">Welcome to Three.js Showcase</h2>
      <p id="scene-description" class="text-sm text-slate-300">Explore advanced Three.js techniques including custom shaders, post-processing, and procedural generation.</p>
    </div>

    <!-- Stats Panel -->
    <div id="stats-panel" class="absolute top-6 right-6 pointer-events-auto bg-slate-900 bg-opacity-80 backdrop-blur p-4 rounded-lg font-mono text-sm border border-slate-700">
      <div>FPS: <span id="fps">0</span></div>
      <div>Triangles: <span id="triangles">0</span></div>
      <div>Draw Calls: <span id="drawcalls">0</span></div>
      <div>Memory: <span id="memory">0</span> MB</div>
    </div>

    <!-- Mobile Info -->
    <div id="mobile-info" class="absolute bottom-6 right-6 pointer-events-auto text-xs text-slate-400 md:hidden">
      Rotate: Touch & Drag
    </div>
  </div>

</body>
</html>
